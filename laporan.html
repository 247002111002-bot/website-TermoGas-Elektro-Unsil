<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Data Sensor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div class="bg-primary text-white shadow" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 fs-5 fw-bold border-bottom">IoT Siliwangi</div>
            <div class="list-group list-group-flush mt-3">
                <a href="dashboard.html" class="list-group-item list-group-item-action bg-transparent text-white border-0">
                    <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                </a>
                <a href="laporan.html" class="list-group-item list-group-item-action bg-transparent text-white active border-0">
                    <i class="fas fa-file-alt me-2"></i>Laporan
                </a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 px-4 shadow-sm d-flex justify-content-between">
                <h5 class="fw-bold m-0 text-dark text-uppercase">Laporan Monitoring Gas</h5>
                <button class="btn btn-primary fw-bold" onclick="window.print()">
                    <i class="fas fa-print me-2"></i> CETAK
                </button>
            </nav>

            <div class="container-fluid p-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <table class="table table-striped table-hover mb-0 text-center">
                            <thead class="table-primary">
                                <tr>
                                    <th>No</th>
                                    <th>Waktu</th>
                                    <th>Suhu (°C)</th>
                                    <th>Gas (PPM)</th>
                                    <th>Keterangan</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>1</td>
                                    <td>2026-04-27 10:00</td>
                                    <td>26</td>
                                    <td>150</td>
                                    <td><span class="badge bg-success">Normal</span></td>
                                </tr>
                                <tr>
                                    <td>2</td>
                                    <td>2026-04-27 10:05</td>
                                    <td>27</td>
                                    <td>420</td>
                                    <td><span class="badge bg-danger">Waspada</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
