<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div class="bg-primary text-white shadow" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 fs-5 fw-bold border-bottom">
                <i class="fas fa-microchip me-2"></i>Siliwangi IoT
            </div>
            <div class="list-group list-group-flush mt-3">
                <a href="dashboard.html" class="list-group-item list-group-item-action bg-transparent text-white active border-0">
                    <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                </a>
                <a href="laporan.html" class="list-group-item list-group-item-action bg-transparent text-white border-0">
                    <i class="fas fa-file-alt me-2"></i>Laporan
                </a>
                <a href="#" class="list-group-item list-group-item-action bg-transparent text-danger mt-5 fw-bold border-0" data-bs-toggle="modal" data-bs-target="#logoutModal">
                    <i class="fas fa-power-off me-2"></i>Keluar
                </a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 px-4 shadow-sm">
                <h5 class="fw-bold m-0 text-primary">Monitoring Real-time</h5>
            </nav>

            <div class="container-fluid p-4">
                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <div class="card p-4 border-0 shadow-sm border-start border-primary border-5">
                            <p class="text-muted mb-1">Suhu Ruangan</p>
                            <h1 class="fw-bold" id="temp-val">--°C</h1>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card p-4 border-0 shadow-sm border-start border-warning border-5">
                            <p class="text-muted mb-1">Gas LPG</p>
                            <h1 class="fw-bold" id="gas-val">-- PPM</h1>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm p-4 border-0">
                    <h5 class="fw-bold mb-3 text-dark">Grafik Konsentrasi Gas</h5>
                    <canvas id="gasChart" height="100"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="logoutModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-body text-center p-5">
                    <i class="fas fa-exclamation-circle fa-4x text-warning mb-3"></i>
                    <h4>Ingin Keluar?</h4>
                    <p class="text-muted">Sesi monitoring akan dihentikan.</p>
                    <div class="mt-4">
                        <button class="btn btn-light me-2 fw-bold" data-bs-dismiss="modal">Batal</button>
                        <a href="index.html" class="btn btn-danger fw-bold">Ya, Keluar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
