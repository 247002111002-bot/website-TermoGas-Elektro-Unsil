<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TermoGas Monitoring System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #4e73df; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .login-card { width: 100%; max-width: 400px; border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.2); background: white; }
    </style>
</head>
<body>
    <div class="card login-card p-4">
        <div class="text-center mb-4">
            <img src="Logo-Universitas-Siliwangi.png" alt="Logo-Universitas-Siliwangi.png" style="width: 100px; height: auto; margin-bottom: 15px;">
            
            <h4 class="fw-bold text-dark">TermoGas Monitoring System</h4>
            <p class="text-muted small">Teknik Elektro - Universitas Siliwangi</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="userInput" class="form-control" placeholder="Masukkan Username" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" id="passInput" class="form-control" placeholder="Masukkan Password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">LOGIN</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;

            // GANTI USERNAME & PASSWORD DI SINI (Contoh: Nama & NPM kamu)
            if (user === "Rendi" && pass === "247002111002") {
                window.location.href = 'dashboard.html';
            } else {
                alert("Login Gagal! Periksa kembali Username dan Password.");
            }
        });
    </script>
</body>
</html>
